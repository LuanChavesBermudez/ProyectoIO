services:
  frontend:
    image: node:24-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
  backend:
    image: python:3.11-slim
    working_dir: /backend
    volumes:
      - ./backend:/backend
    ports:
      - "8000:8000"
    command: sh -c "pip install fastapi uvicorn prophet pandas && uvicorn main:app --host 0.0.0.0 --reload"

     
